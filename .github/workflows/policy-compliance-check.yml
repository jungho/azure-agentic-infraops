# Policy Compliance Check Workflow
# Validates governance guardrails are maintained across agents, instructions, and artifacts
# Ensures Bicep Code Generator and review subagent reference governance constraints

name: policy-compliance-check

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/instructions/**"
      - ".github/data/**"
      - "scripts/validate-governance-refs.mjs"
  push:
    branches: [main, feature/*]
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/instructions/**"
      - ".github/data/**"
      - "scripts/validate-governance-refs.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-compliance:
    name: policy-compliance-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run node validations
        run: npm run validate:_node
